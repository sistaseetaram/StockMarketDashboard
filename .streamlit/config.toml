# Streamlit Cloud Configuration
# This file configures your app for deployment on Streamlit Cloud

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200
port = 8501

[browser]
gatherUsageStats = false
